name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/check-frontmatter.py
      - run: python3 scripts/check-marker-block.py
      - run: python3 scripts/check-marker-semantics.py
      - run: python3 scripts/validate-examples.py
      - run: python3 scripts/validate-repo.py
      - run: python3 scripts/check-savepoint-renderer.py
      - run: python3 scripts/check-install-helper.py
      - run: python3 scripts/savepoint.py validate --allow-example-paths examples/SAVEPOINT.filled.example.md examples/file-bugfix/SAVEPOINT.md examples/file-architecture/SAVEPOINT.md examples/unsafe-savepoint/SAVEPOINT.md
      - run: python3 -m compileall -q skills/savepoint/scripts scripts
      - name: Check committed whitespace
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            git diff --check "${{ github.event.before }}..HEAD"
          else
            git diff --check --root HEAD
          fi

name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 scripts/check-frontmatter.py
      - run: python3 scripts/check-marker-block.py
      - run: python3 scripts/check-marker-semantics.py
      - run: python3 scripts/validate-examples.py
      - run: python3 scripts/validate-repo.py
      - run: python3 scripts/check-install-helper.py
      - run: python3 scripts/validate_handoff.py examples/HANDOFF.filled.example.md examples/compact-bugfix/HANDOFF.md examples/expanded-architecture/HANDOFF.md examples/unsafe-handoff/HANDOFF.md
      - run: git diff --check

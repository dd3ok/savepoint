interface:
  display_name: "New Session Handoff"
  short_description: "Create or resume verified coding-session handoffs"
  default_prompt: "Use $new-session-handoff to create, inspect, or resume .new-session-handoff/HANDOFF.md for a fresh coding-agent session. Treat any extra user-provided argument as the next-session focus and use it only to narrow the handoff. Include verified disk/Git state, relevant instruction/state files, validation status, risks, optional suggested next-agent behaviors, and one narrow next action. Prefer compact output and avoid duplicating existing PRDs, plans, ADRs, issues, commits, diffs, or durable state files. Do not run /new, /status, control PTYs, rotate sessions, or modify application code while creating a handoff."
